services:
  traefik:
    image: traefik:v2.10
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-convergence_web}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keystone:
    build:
      context: ./keystone
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-convergence_web}
      - SESSION_SECRET=${KEYSTONE_SESSION_SECRET}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./keystone/public/uploads:/app/public/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/graphql', (r) => {if (r.statusCode === 404) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keystone.rule=PathPrefix(`/`)"
      - "traefik.http.routers.keystone.entrypoints=web"
      - "traefik.http.routers.keystone.priority=1"
      - "traefik.http.services.keystone.loadbalancer.server.port=3000"

  dynamic-webpages:
    image: denoland/deno:alpine
    restart: unless-stopped
    working_dir: /app
    command: ["deno", "run", "--node-modules-dir=none", "--allow-net", "--allow-read", "--allow-write=/app/logs", "--allow-env", "index.js"]
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - internal
    env_file:
      - .env
    environment:
      - RHOST_ENDPOINT=${RHOST_ENDPOINT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dynamic-webpages.rule=PathPrefix(`/`) && !PathPrefix(`/admin`) && !PathPrefix(`/api`) && !PathPrefix(`/graphql`) && !PathPrefix(`/images`) && !PathPrefix(`/files`)"
      - "traefik.http.routers.dynamic-webpages.entrypoints=web"
      - "traefik.http.routers.dynamic-webpages.priority=10"
      - "traefik.http.services.dynamic-webpages.loadbalancer.server.port=8000"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge

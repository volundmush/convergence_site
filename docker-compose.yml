services:
  keydb:
    image: eqalpha/keydb:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - internal
    command: keydb-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  traefik:
    image: traefik:v3.6.10
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--core.defaultRuleSyntax=v2"
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-convergence_web}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keystone:
    build:
      context: ./keystone
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-convergence_web}
      - SESSION_SECRET=${KEYSTONE_SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./keystone/public/images:/app/keystone/public/images
      - ./keystone/public/files:/app/keystone/public/files
      - ./keystone/public/uploads:/app/keystone/public/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').request({hostname: 'localhost', port: 3000, path: '/admin'}, (r) => {if (r.statusCode >= 500) throw new Error(r.statusCode)}).end()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keystone-admin-https.rule=Host(`convergencemush.org`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.keystone-admin-https.entrypoints=websecure"
      - "traefik.http.routers.keystone-admin-https.tls=true"
      - "traefik.http.routers.keystone-admin-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.keystone-admin-https.priority=100"
      - "traefik.http.routers.keystone-admin-http.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.keystone-admin-http.entrypoints=web"
      - "traefik.http.routers.keystone-admin-http.priority=100"
      - "traefik.http.routers.keystone-api-https.rule=Host(`convergencemush.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.keystone-api-https.entrypoints=websecure"
      - "traefik.http.routers.keystone-api-https.tls=true"
      - "traefik.http.routers.keystone-api-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.keystone-api-https.priority=50"
      - "traefik.http.routers.keystone-api-http.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.keystone-api-http.entrypoints=web"
      - "traefik.http.routers.keystone-api-http.priority=50"
      - "traefik.http.routers.keystone-static-https.rule=Host(`convergencemush.org`) && (PathPrefix(`/images`) || PathPrefix(`/files`))"
      - "traefik.http.routers.keystone-static-https.entrypoints=websecure"
      - "traefik.http.routers.keystone-static-https.tls=true"
      - "traefik.http.routers.keystone-static-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.keystone-static-https.priority=30"
      - "traefik.http.routers.keystone-static-http.rule=PathPrefix(`/images`) || PathPrefix(`/files`)"
      - "traefik.http.routers.keystone-static-http.entrypoints=web"
      - "traefik.http.routers.keystone-static-http.priority=30"
      - "traefik.http.services.keystone.loadbalancer.server.port=3000"

  dynamic-webpages:
    image: denoland/deno:alpine
    restart: unless-stopped
    working_dir: /app
    command: ["deno", "run", "--node-modules-dir=none", "--allow-net", "--allow-read", "--allow-write=/app/logs", "--allow-env", "index.js"]
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - internal
    env_file:
      - .env
    environment:
      - RHOST_ENDPOINT=${RHOST_ENDPOINT}
    depends_on:
      keystone:
        condition: service_healthy
      keydb:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dynamic-webpages-https.rule=Host(`convergencemush.org`) && (PathPrefix(`/`) && !PathPrefix(`/admin`) && !PathPrefix(`/api`) && !PathPrefix(`/images`) && !PathPrefix(`/files`) || PathPrefix(`/gapi`))"
      - "traefik.http.routers.dynamic-webpages-https.entrypoints=websecure"
      - "traefik.http.routers.dynamic-webpages-https.tls=true"
      - "traefik.http.routers.dynamic-webpages-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dynamic-webpages-https.priority=1"
      - "traefik.http.routers.dynamic-webpages-http.rule=(PathPrefix(`/`) && !PathPrefix(`/admin`) && !PathPrefix(`/api`) && !PathPrefix(`/images`) && !PathPrefix(`/files`) || PathPrefix(`/gapi`))"
      - "traefik.http.routers.dynamic-webpages-http.entrypoints=web"
      - "traefik.http.routers.dynamic-webpages-http.priority=1"
      - "traefik.http.services.dynamic-webpages.loadbalancer.server.port=8000"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge

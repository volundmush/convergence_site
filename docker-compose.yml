services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-convergence_web}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keystone:
    build:
      context: ./keystone
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-convergence_web}
      - SESSION_SECRET=${KEYSTONE_SESSION_SECRET}
      - NODE_ENV=production
    volumes:
      - ./keystone/public/uploads:/app/public/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]}
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dynamic-webpages:
    image: denoland/deno:alpine
    restart: unless-stopped
    working_dir: /app
    command: ["deno", "run", "--node-modules-dir=none", "--allow-net", "--allow-read", "--allow-write=/app/logs", "--allow-env", "index.js"]
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - RHOST_ENDPOINT=${RHOST_ENDPOINT}

networks:
  internal:
    driver: bridge
